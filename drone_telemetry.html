<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drone Telemetry HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─── Reset & Base ─── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0c10;
        --bg2: #0f1318;
        --bg3: #141a22;
        --border: rgba(0, 200, 255, 0.12);
        --border2: rgba(0, 200, 255, 0.25);
        --accent: #00c8ff;
        --accent2: #00ffaa;
        --accent3: #ff6b35;
        --warn: #ffcc00;
        --text: #cde8f0;
        --text2: #5c8496;
        --text3: #3a5566;
        --font-hud: "Share Tech Mono", monospace;
        --font-ui: "Rajdhani", sans-serif;
        --green: #39ff6e;
        --blue: #00c8ff;
        --purple: #a855f7;
        --red: #ff4444;
      }

      body {
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: var(--font-ui);
        color: var(--text);
        padding: 20px;
      }

      /* ─── HUD Panel ─── */
      .hud {
        width: 340px;
        background: var(--bg2);
        border: 1px solid var(--border2);
        position: relative;
        overflow: hidden;
      }

      /* Corner cuts */
      .hud::before,
      .hud::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-color: var(--accent);
        border-style: solid;
        z-index: 2;
      }
      .hud::before {
        top: 0;
        left: 0;
        border-width: 2px 0 0 2px;
      }
      .hud::after {
        bottom: 0;
        right: 0;
        border-width: 0 2px 2px 0;
      }

      /* Scan line animation */
      .hud-scanline {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        opacity: 0.4;
        animation: scan 4s linear infinite;
        z-index: 1;
        pointer-events: none;
      }
      @keyframes scan {
        0% {
          top: 0;
          opacity: 0.4;
        }
        50% {
          opacity: 0.15;
        }
        100% {
          top: 100%;
          opacity: 0.4;
        }
      }

      /* ─── Header ─── */
      .hud-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 10px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 200, 255, 0.03);
      }

      .hud-title {
        font-family: var(--font-hud);
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-hud);
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--text2);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
        animation: pulse-dot 1.5s ease-in-out infinite;
      }
      .status-dot.red {
        background: var(--red);
        box-shadow: 0 0 6px var(--red);
      }
      .status-dot.yellow {
        background: var(--warn);
        box-shadow: 0 0 6px var(--warn);
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ─── Metric Grid ─── */
      .metric-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-bottom: 1px solid var(--border);
      }

      .metric-cell {
        padding: 14px 16px;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        position: relative;
        transition: background 0.3s;
      }
      .metric-cell:nth-child(even) {
        border-right: none;
      }
      .metric-cell:nth-last-child(-n + 2) {
        border-bottom: none;
      }

      .metric-cell.active {
        background: rgba(0, 200, 255, 0.04);
      }

      .metric-label {
        font-family: var(--font-hud);
        font-size: 9px;
        letter-spacing: 0.15em;
        color: var(--text2);
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .metric-value {
        font-family: var(--font-hud);
        font-size: 34px;
        font-weight: 400;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.02em;
        transition: color 0.3s;
      }

      .metric-value.changed {
        color: var(--accent);
        text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
      }

      .metric-unit {
        font-size: 10px;
        color: var(--text3);
        font-family: var(--font-hud);
        margin-top: 4px;
        letter-spacing: 0.05em;
      }

      /* Accent bar on left of active cell */
      .metric-cell::before {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 2px;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .metric-cell.active::before {
        opacity: 1;
      }

      /* ─── Bar Rows ─── */
      .bars-section {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bar-row {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .bar-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .bar-label {
        font-family: var(--font-hud);
        font-size: 9px;
        letter-spacing: 0.12em;
        color: var(--text2);
        text-transform: uppercase;
      }

      .bar-val {
        font-family: var(--font-hud);
        font-size: 10px;
        color: var(--text);
        letter-spacing: 0.05em;
        min-width: 36px;
        text-align: right;
      }

      .bar-track {
        height: 4px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 0;
        overflow: hidden;
        position: relative;
      }

      .bar-fill {
        height: 100%;
        border-radius: 0;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }

      /* Segmented look via repeating gradient */
      .bar-fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 8px,
          rgba(0, 0, 0, 0.25) 8px,
          rgba(0, 0, 0, 0.25) 9px
        );
      }

      .bar-battery {
        background: var(--green);
        box-shadow: 0 0 6px rgba(57, 255, 110, 0.4);
      }
      .bar-gps {
        background: var(--blue);
        box-shadow: 0 0 6px rgba(0, 200, 255, 0.4);
      }
      .bar-cpu {
        background: var(--purple);
        box-shadow: 0 0 6px rgba(168, 85, 247, 0.4);
      }

      /* ─── Controls ─── */
      .controls-section {
        padding: 12px 16px;
      }

      .ctrl-label {
        font-family: var(--font-hud);
        font-size: 9px;
        letter-spacing: 0.15em;
        color: var(--text3);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .btn-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        margin-bottom: 5px;
      }

      .btn-grid-bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      .ctrl-btn {
        font-family: var(--font-hud);
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 4px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        color: var(--text2);
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        user-select: none;
      }

      .ctrl-btn:hover {
        background: rgba(0, 200, 255, 0.08);
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: inset 0 0 12px rgba(0, 200, 255, 0.05);
      }

      .ctrl-btn:active,
      .ctrl-btn.pressed {
        background: rgba(0, 200, 255, 0.15);
        border-color: var(--accent);
        color: #fff;
        transform: scale(0.97);
      }

      .ctrl-btn.land {
        background: rgba(255, 68, 68, 0.06);
        border-color: rgba(255, 68, 68, 0.3);
        color: var(--red);
      }
      .ctrl-btn.land:hover {
        background: rgba(255, 68, 68, 0.15);
        border-color: var(--red);
        box-shadow: inset 0 0 12px rgba(255, 68, 68, 0.08);
      }

      .ctrl-btn.hover-btn {
        background: rgba(0, 255, 170, 0.04);
        border-color: rgba(0, 255, 170, 0.2);
        color: var(--accent2);
      }
      .ctrl-btn.hover-btn:hover {
        background: rgba(0, 255, 170, 0.1);
        border-color: var(--accent2);
      }

      /* ─── Footer ─── */
      .hud-footer {
        padding: 8px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0, 0, 0, 0.2);
      }

      .footer-info {
        font-family: var(--font-hud);
        font-size: 8px;
        letter-spacing: 0.1em;
        color: var(--text3);
        text-transform: uppercase;
      }

      .footer-time {
        font-family: var(--font-hud);
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0.1em;
        opacity: 0.6;
      }

      /* ─── Glow on HUD border when active ─── */
      .hud.flying {
        border-color: rgba(0, 200, 255, 0.4);
        box-shadow:
          0 0 30px rgba(0, 200, 255, 0.06),
          inset 0 0 40px rgba(0, 200, 255, 0.02);
      }
    </style>
  </head>
  <body>
    <div class="hud" id="hud">
      <div class="hud-scanline"></div>

      <!-- Header -->
      <div class="hud-header">
        <span class="hud-title">Telemetry</span>
        <div class="status-badge">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">IDLE</span>
        </div>
      </div>

      <!-- Metrics -->
      <div class="metric-grid">
        <div class="metric-cell" id="cell-alt">
          <div class="metric-label">Altitude</div>
          <div class="metric-value" id="val-alt">0</div>
          <div class="metric-unit">meters</div>
        </div>
        <div class="metric-cell" id="cell-spd">
          <div class="metric-label">Speed</div>
          <div class="metric-value" id="val-spd">0.0</div>
          <div class="metric-unit">m/s</div>
        </div>
        <div class="metric-cell" id="cell-pitch">
          <div class="metric-label">Pitch</div>
          <div class="metric-value" id="val-pitch">0</div>
          <div class="metric-unit">deg</div>
        </div>
        <div class="metric-cell" id="cell-roll">
          <div class="metric-label">Roll</div>
          <div class="metric-value" id="val-roll">0</div>
          <div class="metric-unit">deg</div>
        </div>
      </div>

      <!-- Bars -->
      <div class="bars-section">
        <div class="bar-row">
          <div class="bar-meta">
            <span class="bar-label">Battery</span>
            <span class="bar-val" id="val-bat">100%</span>
          </div>
          <div class="bar-track">
            <div
              class="bar-fill bar-battery"
              id="bar-bat"
              style="width: 100%"
            ></div>
          </div>
        </div>
        <div class="bar-row">
          <div class="bar-meta">
            <span class="bar-label">GPS Signal</span>
            <span class="bar-val" id="val-gps">100%</span>
          </div>
          <div class="bar-track">
            <div
              class="bar-fill bar-gps"
              id="bar-gps"
              style="width: 100%"
            ></div>
          </div>
        </div>
        <div class="bar-row">
          <div class="bar-meta">
            <span class="bar-label">CPU Load</span>
            <span class="bar-val" id="val-cpu">12%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-cpu" id="bar-cpu" style="width: 12%"></div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-section">
        <div class="ctrl-label">Controls</div>
        <div class="btn-grid">
          <button class="ctrl-btn" id="btn-forward" onclick="cmd('forward')">
            ▲ Fwd
          </button>
          <button class="ctrl-btn" id="btn-backward" onclick="cmd('backward')">
            ▼ Back
          </button>
          <button class="ctrl-btn" id="btn-up" onclick="cmd('up')">↑ Up</button>
          <button class="ctrl-btn" id="btn-down" onclick="cmd('down')">
            ↓ Down
          </button>
          <button class="ctrl-btn" id="btn-left" onclick="cmd('left')">
            ◀ Left
          </button>
          <button class="ctrl-btn" id="btn-right" onclick="cmd('right')">
            ▶ Right
          </button>
          <button class="ctrl-btn hover-btn" onclick="cmd('hover')">
            ⏸ Hover
          </button>
          <button class="ctrl-btn land" onclick="cmd('land')">⏬ Land</button>
        </div>
      </div>

      <!-- Footer -->
      <div class="hud-footer">
        <span class="footer-info"
          >Drone v1.0 &nbsp;|&nbsp; <span id="drone-id">UID-7E3F</span></span
        >
        <span class="footer-time" id="clock">00:00:00</span>
      </div>
    </div>

    <script>
      /* ── State ── */
      const S = {
        alt: 0,
        spd: 0,
        pitch: 0,
        roll: 0,
        bat: 100,
        gps: 100,
        cpu: 12,
        flying: false,
        target: {
          alt: 0,
          pitch: 0,
          roll: 0,
          spd: 0,
          bat: 100,
          gps: 100,
          cpu: 12,
        },
        status: "IDLE",
      };

      /* ── Helpers ── */
      const $ = (id) => document.getElementById(id);
      function setText(id, v) {
        $(id).textContent = v;
      }
      function setWidth(id, v) {
        $(id).style.width = Math.max(0, Math.min(100, v)) + "%";
      }

      function flashMetric(cellId, valId) {
        $(valId).classList.add("changed");
        $(cellId).classList.add("active");
        setTimeout(() => {
          $(valId).classList.remove("changed");
          $(cellId).classList.remove("active");
        }, 800);
      }

      function setStatus(label, dotClass) {
        $("status-text").textContent = label;
        const dot = $("status-dot");
        dot.className = "status-dot " + (dotClass || "");
      }

      /* ── External telemetry updates ── */
      let lastFlying = null;
      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || data.type !== "telemetry") return;

        if (typeof data.alt === "number") S.target.alt = data.alt;
        if (typeof data.spd === "number") S.target.spd = data.spd;
        if (typeof data.pitch === "number") S.target.pitch = data.pitch;
        if (typeof data.roll === "number") S.target.roll = data.roll;
        if (typeof data.battery === "number") S.target.bat = data.battery;
        if (typeof data.gps === "number") S.target.gps = data.gps;
        if (typeof data.cpu === "number") S.target.cpu = data.cpu;
        if (typeof data.status === "string") S.status = data.status;

        if (typeof data.flying === "boolean") {
          S.flying = data.flying;
          $("hud").classList.toggle("flying", S.flying);

          if (S.flying !== lastFlying) {
            lastFlying = S.flying;
            setStatus(
              S.flying ? "FLYING" : S.status || "IDLE",
              S.flying ? "" : "red",
            );
          }
        }

        if (!S.flying && S.status) {
          if (S.status === "IDLE") setStatus("IDLE", "red");
          else if (S.status === "LANDING") setStatus("LANDING", "yellow");
          else if (S.status === "HOVER") setStatus("HOVER", "");
          else setStatus(S.status, "");
        }
      });

      /* ── Commands ── */
      function cmd(action) {
        const btn = $("btn-" + action);
        if (btn) {
          btn.classList.add("pressed");
          setTimeout(() => btn.classList.remove("pressed"), 200);
        }

        // Send action to the parent simulator; the HUD values will be updated
        // from the parent via `postMessage` of telemetry numbers.
        window.parent.postMessage({ type: "telemetry-cmd", action }, "*");
      }

      /* ── Telemetry loop ── */
      const lerp = (a, b, t) => a + (b - a) * t;

      setInterval(() => {
        S.alt = lerp(S.alt, S.target.alt, 0.07);
        S.pitch = lerp(S.pitch, S.target.pitch, 0.1);
        S.roll = lerp(S.roll, S.target.roll, 0.1);
        S.spd = lerp(S.spd, S.target.spd, 0.1);

        S.bat = lerp(S.bat, S.target.bat, 0.12);
        S.gps = lerp(S.gps, S.target.gps, 0.12);
        S.cpu = lerp(S.cpu, S.target.cpu, 0.16);

        if (S.alt < 0.05 && !S.flying) {
          S.alt = 0;
          if ($("status-text").textContent === "LANDING")
            setStatus("IDLE", "red");
        }

        setText("val-alt", Math.round(S.alt));
        setText("val-spd", Math.abs(S.spd).toFixed(1));
        setText("val-pitch", Math.round(S.pitch));
        setText("val-roll", Math.round(S.roll));
        setText("val-bat", Math.round(S.bat) + "%");
        setText("val-gps", Math.round(S.gps) + "%");
        setText("val-cpu", Math.round(S.cpu) + "%");

        setWidth("bar-bat", S.bat);
        setWidth("bar-gps", S.gps);
        setWidth("bar-cpu", S.cpu);

        /* Battery color warning */
        const bb = $("bar-bat");
        if (S.bat < 20) {
          bb.style.background = "var(--red)";
          bb.style.boxShadow = "0 0 6px rgba(255,68,68,0.5)";
        } else if (S.bat < 50) {
          bb.style.background = "var(--warn)";
          bb.style.boxShadow = "0 0 6px rgba(255,204,0,0.4)";
        } else {
          bb.style.background = "var(--green)";
          bb.style.boxShadow = "0 0 6px rgba(57,255,110,0.4)";
        }
      }, 100);

      /* ── Clock ── */
      function updateClock() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        $("clock").textContent =
          `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
